<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>💳 Eco-Waste Payment System - User</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        :root {
            --primary: #00c897;
            --primary-dark: #00997a;
            --dark: #0f172a;
            --darker: #0a0f1f;
            --card-bg: rgba(255, 255, 255, 0.07);
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.08);
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            --radius: 16px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            background: var(--darker);
            min-height: 100vh;
            color: var(--text);
            padding: 20px;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--dark); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

        .header {
            background: linear-gradient(135deg, #0a0f1f 0%, #1a2a3a 100%);
            border-bottom: 1px solid var(--border);
            padding: 1.5rem 2rem;
            border-radius: var(--radius);
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .header h1 {
            font-weight: 700;
            font-size: 1.8rem;
            background: linear-gradient(135deg, #00c897, #00f5b0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header h1 i { -webkit-text-fill-color: #00c897; }
        .header-actions { display: flex; gap: 10px; flex-wrap: wrap; }

        .container { max-width: 1200px; margin: 0 auto; }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            transition: var(--transition);
        }

        .card:hover { border-color: rgba(0, 200, 151, 0.15); }

        .card-title {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 12px;
        }

        .card-title i { color: var(--primary); }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        @media (max-width: 1024px) { .grid-2 { grid-template-columns: 1fr; } }

        .payment-methods {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 16px;
        }

        .method-btn {
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--glass);
            color: var(--text);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .method-btn:hover { border-color: var(--primary); background: rgba(0, 200, 151, 0.05); }
        .method-btn.active { border-color: var(--primary); background: rgba(0, 200, 151, 0.1); box-shadow: 0 0 20px rgba(0, 200, 151, 0.05); }
        .method-btn i { font-size: 1.2rem; color: var(--primary); }

        .form-group { margin-bottom: 14px; }
        .form-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 10px 14px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 200, 151, 0.1);
        }

        .form-group select option { background: var(--dark); color: var(--text); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            justify-content: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            box-shadow: 0 4px 15px rgba(0, 200, 151, 0.25);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0, 200, 151, 0.35); }

        .btn-success { background: #198754; color: white; }
        .btn-success:hover { background: #157347; transform: translateY(-2px); }

        .btn-secondary { background: var(--glass); color: var(--text); border: 1px solid var(--border); }
        .btn-secondary:hover { border-color: var(--primary); background: rgba(0, 200, 151, 0.05); }

        .btn-sm { padding: 6px 14px; font-size: 0.75rem; }
        .btn-block { width: 100%; }

        .status-badge {
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-paid { background: rgba(0, 200, 151, 0.15); color: #00c897; }
        .status-pending { background: rgba(255, 193, 7, 0.15); color: #ffc107; }
        .status-failed { background: rgba(220, 53, 69, 0.15); color: #dc3545; }

        .invoice-preview {
            background: white;
            color: #1a1a2e;
            padding: 30px;
            border-radius: 12px;
            margin-top: 16px;
        }

        .invoice-preview .header {
            display: flex;
            justify-content: space-between;
            border-bottom: 2px solid #00c897;
            padding-bottom: 16px;
            margin-bottom: 16px;
            background: none;
            border-radius: 0;
            padding: 0 0 16px 0;
        }

        .invoice-preview .header h2 { color: #1a1a2e; -webkit-text-fill-color: #1a1a2e; font-size: 1.5rem; }
        .invoice-preview .header .invoice-number { color: #666; font-size: 0.85rem; }

        .invoice-preview .details { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
        .invoice-preview .details .label { font-size: 0.7rem; color: #666; text-transform: uppercase; }
        .invoice-preview .details .value { font-weight: 600; font-size: 0.95rem; }

        .invoice-preview table { width: 100%; border-collapse: collapse; margin: 16px 0; }
        .invoice-preview table th { background: #f8f9fa; padding: 10px; text-align: left; font-size: 0.8rem; text-transform: uppercase; color: #666; }
        .invoice-preview table td { padding: 10px; border-bottom: 1px solid #eee; font-size: 0.9rem; }
        .invoice-preview .total { text-align: right; font-size: 1.2rem; font-weight: 700; padding-top: 12px; border-top: 2px solid #00c897; }
        .invoice-preview .total .amount { color: #00c897; }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: var(--dark);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            max-width: 700px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 30px;
            animation: modalIn 0.3s ease;
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.95) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal .close-btn { float: right; background: none; border: none; color: var(--text-muted); font-size: 1.5rem; cursor: pointer; }
        .modal .close-btn:hover { color: var(--text); }

        .invoice-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 14px;
            border-bottom: 1px solid var(--border);
            transition: var(--transition);
        }
        .invoice-item:hover { background: rgba(255, 255, 255, 0.02); }
        .invoice-item .info { display: flex; flex-direction: column; gap: 2px; }
        .invoice-item .info .number { font-weight: 600; font-size: 0.9rem; }
        .invoice-item .info .details { font-size: 0.75rem; color: var(--text-muted); }
        .invoice-item .amount { font-weight: 700; color: var(--primary); }

        .mt-16 { margin-top: 16px; }
        .mb-16 { margin-bottom: 16px; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
        .text-center { text-align: center; }
        .text-success { color: #00c897; }
        .text-danger { color: #dc3545; }
        .text-warning { color: #ffc107; }

        /* Toast Notification */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--dark);
            border: 1px solid var(--primary);
            border-radius: 12px;
            padding: 16px 24px;
            color: var(--text);
            z-index: 2000;
            box-shadow: var(--shadow);
            animation: slideIn 0.3s ease;
            max-width: 400px;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes slideOut {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(100%); opacity: 0; }
        }

        @media (max-width: 768px) {
            .header { flex-direction: column; text-align: center; }
            .header h1 { font-size: 1.3rem; }
            .payment-methods { grid-template-columns: 1fr; }
            .form-row { grid-template-columns: 1fr; }
            .modal { padding: 20px; }
            .invoice-preview .details { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">

    <!-- HEADER -->
    <div class="header">
        <h1><i class="fas fa-credit-card"></i> Pay for Service</h1>
        <div class="header-actions">
            <button class="btn btn-secondary" onclick="viewMyInvoices()"><i class="fas fa-file-invoice"></i> My Invoices</button>
            <button class="btn btn-success" onclick="window.location.href='admin-payments.html'"><i class="fas fa-user-shield"></i> Admin Panel</button>
        </div>
    </div>

    <!-- PAYMENT FORM -->
    <div class="card">
        <div class="card-title"><i class="fas fa-cog"></i> Make Payment</div>

        <div class="payment-methods">
            <button class="method-btn active" onclick="selectMethod(this, 'mtn')">
                <i class="fas fa-phone"></i> MTN Mobile Money
            </button>
            <button class="method-btn" onclick="selectMethod(this, 'airtel')">
                <i class="fas fa-phone"></i> Airtel Money
            </button>
            <button class="method-btn" onclick="selectMethod(this, 'bank')">
                <i class="fas fa-university"></i> Bank Transfer
            </button>
            <button class="method-btn" onclick="selectMethod(this, 'card')">
                <i class="fas fa-credit-card"></i> Debit/Credit Card
            </button>
        </div>

        <div class="form-group">
            <label><i class="fas fa-user"></i> Full Name</label>
            <input type="text" id="customerName" value="John Doe" placeholder="Enter your full name" />
        </div>

        <div class="form-row">
            <div class="form-group">
                <label><i class="fas fa-file-invoice"></i> Service Type</label>
                <select id="serviceType">
                    <option value="Waste Collection">Waste Collection</option>
                    <option value="Recycling Service">Recycling Service</option>
                    <option value="Special Pickup">Special Pickup</option>
                    <option value="Bulk Waste">Bulk Waste</option>
                </select>
            </div>
            <div class="form-group">
                <label><i class="fas fa-money-bill-wave"></i> Amount (RWF)</label>
                <input type="number" id="paymentAmount" value="25000" step="100" min="100" />
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label><i class="fas fa-phone"></i> Phone Number</label>
                <input type="text" id="phoneNumber" value="0788123456" placeholder="e.g. 0788123456" />
            </div>
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Email</label>
                <input type="email" id="email" value="john@example.com" placeholder="Enter email" />
            </div>
        </div>

        <button class="btn btn-primary btn-block" onclick="processPayment()">
            <i class="fas fa-lock"></i> Pay Now
        </button>
        <div id="paymentResult" class="mt-16" style="font-size:0.9rem;"></div>
    </div>

    <!-- INVOICE SECTION -->
    <div class="card mt-16">
        <div class="card-title flex-between">
            <span><i class="fas fa-file-invoice"></i> My Recent Invoices</span>
            <button class="btn btn-secondary btn-sm" onclick="viewMyInvoices()">
                <i class="fas fa-eye"></i> View All
            </button>
        </div>
        <div id="recentInvoices">
            <div style="padding:20px;text-align:center;color:var(--text-muted);">No invoices yet. Make a payment to generate an invoice.</div>
        </div>
    </div>

    <!-- INVOICE MODAL -->
    <div class="modal-overlay" id="invoiceModal">
        <div class="modal">
            <button class="close-btn" onclick="closeInvoiceModal()"><i class="fas fa-times"></i></button>
            <h2 style="margin-bottom:16px;"><i class="fas fa-file-invoice" style="color:var(--primary);"></i> My Invoices</h2>
            <div id="allInvoicesList"></div>
            <div class="mt-16">
                <button class="btn btn-secondary" onclick="closeInvoiceModal()">Close</button>
            </div>
        </div>
    </div>

    <!-- INVOICE DETAIL MODAL -->
    <div class="modal-overlay" id="invoiceDetailModal">
        <div class="modal" style="max-width:700px;">
            <button class="close-btn" onclick="closeInvoiceDetail()"><i class="fas fa-times"></i></button>
            <div id="invoiceDetailContent"></div>
        </div>
    </div>

</div>

<script>
    // ===== DATA STORE =====
    let payments = [];
    let invoices = [];
    let selectedMethod = 'mtn';
    let paymentIdCounter = 1001;
    let invoiceIdCounter = 5001;

    // ===== INIT =====
    function init() {
        // Load from localStorage
        const savedPayments = localStorage.getItem('ecowaste_payments');
        const savedInvoices = localStorage.getItem('ecowaste_invoices');
        const savedCounters = localStorage.getItem('ecowaste_counters');

        if (savedPayments) {
            payments = JSON.parse(savedPayments);
        } else {
            // Seed sample data
            const samplePayments = [
                { id: 'PAY-1001', customer: 'John Doe', amount: 25000, method: 'MTN Mobile Money', status: 'paid', date: '2026-07-10', service: 'Waste Collection', phone: '0788123456', email: 'john@example.com' },
                { id: 'PAY-1002', customer: 'Jane Smith', amount: 40000, method: 'Airtel Money', status: 'paid', date: '2026-07-09', service: 'Recycling Service', phone: '0788234567', email: 'jane@example.com' },
                { id: 'PAY-1003', customer: 'Peter Munyaneza', amount: 15000, method: 'Bank Transfer', status: 'pending', date: '2026-07-08', service: 'Special Pickup', phone: '0788345678', email: 'peter@example.com' },
            ];
            payments = samplePayments;
            paymentIdCounter = 1004;
        }

        if (savedInvoices) {
            invoices = JSON.parse(savedInvoices);
            const ids = invoices.map(i => parseInt(i.id.replace('INV-', '')));
            if (ids.length > 0) invoiceIdCounter = Math.max(...ids) + 1;
        } else {
            // Generate invoices from payments
            payments.forEach(p => generateInvoice(p));
        }

        if (savedCounters) {
            const counters = JSON.parse(savedCounters);
            paymentIdCounter = counters.paymentIdCounter || 1004;
            invoiceIdCounter = counters.invoiceIdCounter || 5001;
        }

        renderAll();
        updateStats();
        saveData();
    }

    // ===== GENERATE INVOICE =====
    function generateInvoice(payment) {
        const existing = invoices.find(i => i.paymentId === payment.id);
        if (existing) return existing;

        const invoice = {
            id: 'INV-' + invoiceIdCounter++,
            paymentId: payment.id,
            customer: payment.customer,
            amount: payment.amount,
            service: payment.service || 'Waste Collection',
            date: payment.date || new Date().toISOString().split('T')[0],
            status: payment.status === 'paid' ? 'paid' : 'pending',
            dueDate: new Date(Date.now() + 30 * 24 * 60 * 60 * 1000).toISOString().split('T')[0],
            items: [
                { description: payment.service || 'Waste Collection Service', quantity: 1, unitPrice: payment.amount }
            ],
            paymentMethod: payment.method,
            paymentStatus: payment.status,
            phone: payment.phone,
            email: payment.email
        };
        invoices.push(invoice);
        saveData();
        return invoice;
    }

    // ===== PROCESS PAYMENT =====
    function processPayment() {
        const customer = document.getElementById('customerName').value.trim();
        const service = document.getElementById('serviceType').value;
        const amount = parseFloat(document.getElementById('paymentAmount').value);
        const phone = document.getElementById('phoneNumber').value.trim();
        const email = document.getElementById('email').value.trim();

        if (!customer) { showResult('Please enter your name.', 'danger'); return; }
        if (!amount || amount < 100) { showResult('Please enter a valid amount (minimum 100 RWF).', 'danger'); return; }
        if (!phone) { showResult('Please enter your phone number.', 'danger'); return; }

        // Simulate payment processing
        const statuses = ['paid', 'paid', 'paid', 'pending'];
        const status = statuses[Math.floor(Math.random() * statuses.length)];

        const methodNames = {
            'mtn': 'MTN Mobile Money',
            'airtel': 'Airtel Money',
            'bank': 'Bank Transfer',
            'card': 'Debit/Credit Card'
        };

        const payment = {
            id: 'PAY-' + paymentIdCounter++,
            customer: customer,
            amount: amount,
            method: methodNames[selectedMethod] || 'MTN Mobile Money',
            status: status,
            date: new Date().toISOString().split('T')[0],
            service: document.getElementById('serviceType').options[document.getElementById('serviceType').selectedIndex].text,
            phone: phone,
            email: email
        };

        payments.push(payment);
        const invoice = generateInvoice(payment);

        renderAll();
        updateStats();
        saveData();

        const statusMsg = status === 'paid' ? '✅ Payment successful!' :
                         status === 'pending' ? '⏳ Payment pending verification. We will notify you once confirmed.' :
                         '❌ Payment failed. Please try again.';

        const msg = `${statusMsg}\nInvoice generated: ${invoice.id}\nAmount: ${formatCurrency(amount)} RWF`;
        showResult(msg, status === 'paid' ? 'success' : status === 'pending' ? 'warning' : 'danger');

        // Clear form
        document.getElementById('paymentAmount').value = '';
        document.getElementById('phoneNumber').value = '';
        document.getElementById('email').value = '';

        // Show invoice preview
        if (status === 'paid') {
            setTimeout(() => viewInvoice(invoice.id), 500);
        }
    }

    function formatCurrency(amount) {
        return amount.toLocaleString('rw-RW', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
    }

    function showResult(msg, type) {
        const el = document.getElementById('paymentResult');
        const colors = {
            success: '#00c897',
            warning: '#ffc107',
            danger: '#dc3545'
        };
        el.style.color = colors[type] || '#e2e8f0';
        el.innerHTML = msg.replace(/\n/g, '<br>');
        setTimeout(() => { el.innerHTML = ''; }, 8000);
    }

    // ===== SELECT PAYMENT METHOD =====
    function selectMethod(el, method) {
        document.querySelectorAll('.method-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        selectedMethod = method;
    }

    // ===== RENDER ALL =====
    function renderAll() {
        renderRecentInvoices();
        renderAllInvoices();
    }

    // ===== RENDER RECENT INVOICES =====
    function renderRecentInvoices() {
        const container = document.getElementById('recentInvoices');
        if (invoices.length === 0) {
            container.innerHTML = `<div style="padding:20px;text-align:center;color:var(--text-muted);">No invoices yet. Make a payment to generate an invoice.</div>`;
            return;
        }
        let html = '';
        invoices.slice(-5).reverse().forEach(inv => {
            const statusIcon = inv.status === 'paid' ? '✅' : '⏳';
            html += `
                <div class="invoice-item">
                    <div class="info">
                        <span class="number">${inv.id}</span>
                        <span class="details">${inv.service} · ${inv.date}</span>
                    </div>
                    <div class="flex-between" style="gap:12px;">
                        <span class="amount">${formatCurrency(inv.amount)} RWF</span>
                        <button class="btn btn-secondary btn-sm" onclick="viewInvoice('${inv.id}')">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
    }

    // ===== RENDER ALL INVOICES =====
    function renderAllInvoices() {
        const container = document.getElementById('allInvoicesList');
        if (invoices.length === 0) {
            container.innerHTML = `<div style="padding:20px;text-align:center;color:var(--text-muted);">No invoices found</div>`;
            return;
        }
        let html = '';
        invoices.slice().reverse().forEach(inv => {
            const statusClass = inv.status === 'paid' ? 'status-paid' : 'status-pending';
            html += `
                <div class="invoice-item">
                    <div class="info">
                        <span class="number">${inv.id}</span>
                        <span class="details">${inv.service} · ${inv.date}</span>
                    </div>
                    <div class="flex-between" style="gap:12px;">
                        <span class="amount">${formatCurrency(inv.amount)} RWF</span>
                        <span class="status-badge ${statusClass}">${inv.status}</span>
                        <button class="btn btn-secondary btn-sm" onclick="viewInvoice('${inv.id}')">
                            <i class="fas fa-file-pdf"></i>
                        </button>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
    }

    // ===== VIEW INVOICE =====
    function viewInvoice(invoiceId) {
        const inv = invoices.find(i => i.id === invoiceId);
        if (!inv) return;

        const container = document.getElementById('invoiceDetailContent');
        const itemsHtml = inv.items.map(item => `
            <tr>
                <td>${item.description}</td>
                <td>${item.quantity}</td>
                <td>${formatCurrency(item.unitPrice)} RWF</td>
                <td>${formatCurrency(item.quantity * item.unitPrice)} RWF</td>
            </tr>
        `).join('');

        container.innerHTML = `
            <div class="invoice-preview">
                <div class="header">
                    <div>
                        <h2><i class="fas fa-recycle" style="color:#00c897;"></i> Eco-Waste</h2>
                        <p style="font-size:0.8rem;color:#666;">Environmental Services</p>
                    </div>
                    <div style="text-align:right;">
                        <div style="font-weight:700;font-size:1.1rem;">INVOICE</div>
                        <div class="invoice-number">#${inv.id}</div>
                        <div style="font-size:0.8rem;color:#666;">Date: ${inv.date}</div>
                    </div>
                </div>

                <div class="details">
                    <div>
                        <div class="label">Bill To</div>
                        <div class="value">${inv.customer}</div>
                    </div>
                    <div>
                        <div class="label">Due Date</div>
                        <div class="value">${inv.dueDate || 'N/A'}</div>
                    </div>
                    <div>
                        <div class="label">Service</div>
                        <div class="value">${inv.service}</div>
                    </div>
                    <div>
                        <div class="label">Payment Method</div>
                        <div class="value">${inv.paymentMethod || 'N/A'}</div>
                    </div>
                </div>

                <table>
                    <thead>
                        <tr>
                            <th>Description</th>
                            <th>Qty</th>
                            <th>Unit Price</th>
                            <th>Total</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${itemsHtml}
                    </tbody>
                </table>

                <div class="total">
                    <span>Total Amount: </span>
                    <span class="amount">${formatCurrency(inv.amount)} RWF</span>
                </div>

                <div style="margin-top:16px;padding-top:16px;border-top:1px solid #eee;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">
                    <div>
                        <span style="font-size:0.8rem;color:#666;">Status: </span>
                        <span class="status-badge ${inv.status === 'paid' ? 'status-paid' : 'status-pending'}">${inv.status.toUpperCase()}</span>
                    </div>
                    <div>
                        <button class="btn btn-primary btn-sm" onclick="downloadInvoice('${inv.id}')">
                            <i class="fas fa-download"></i> Download PDF
                        </button>
                    </div>
                </div>
            </div>
        `;

        document.getElementById('invoiceDetailModal').classList.add('active');
    }

    // ===== DOWNLOAD INVOICE =====
    function downloadInvoice(invoiceId) {
        showNotification(`📄 Downloading invoice ${invoiceId} as PDF... (Simulated)`);
    }

    // ===== UPDATE STATS =====
    function updateStats() {
        const totalRevenue = payments.filter(p => p.status === 'paid').reduce((sum, p) => sum + p.amount, 0);
        localStorage.setItem('ecowaste_stats', JSON.stringify({
            totalRevenue: totalRevenue,
            paidCount: payments.filter(p => p.status === 'paid').length,
            pendingCount: payments.filter(p => p.status === 'pending').length,
            totalPayments: payments.length
        }));
    }

    // ===== SAVE DATA =====
    function saveData() {
        localStorage.setItem('ecowaste_payments', JSON.stringify(payments));
        localStorage.setItem('ecowaste_invoices', JSON.stringify(invoices));
        localStorage.setItem('ecowaste_counters', JSON.stringify({
            paymentIdCounter: paymentIdCounter,
            invoiceIdCounter: invoiceIdCounter
        }));
        updateStats();
    }

    // ===== VIEW MY INVOICES =====
    function viewMyInvoices() {
        renderAllInvoices();
        document.getElementById('invoiceModal').classList.add('active');
    }

    function closeInvoiceModal() {
        document.getElementById('invoiceModal').classList.remove('active');
    }

    function closeInvoiceDetail() {
        document.getElementById('invoiceDetailModal').classList.remove('active');
    }

    // ===== NOTIFICATION =====
    function showNotification(msg) {
        const el = document.createElement('div');
        el.className = 'toast';
        el.innerHTML = msg;
        document.body.appendChild(el);
        setTimeout(() => {
            el.style.animation = 'slideOut 0.3s ease';
            setTimeout(() => el.remove(), 300);
        }, 3000);
    }

    // ===== CLICK OUTSIDE TO CLOSE =====
    document.querySelectorAll('.modal-overlay').forEach(overlay => {
        overlay.addEventListener('click', function(e) {
            if (e.target === this) {
                this.classList.remove('active');
            }
        });
    });

    // ===== INIT =====
    document.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>
