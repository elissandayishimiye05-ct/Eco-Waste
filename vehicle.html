<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🚚 Eco-Waste Vehicle Management</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        :root {
            --primary: #00c897;
            --primary-dark: #00997a;
            --dark: #0f172a;
            --darker: #0a0f1f;
            --card-bg: rgba(255, 255, 255, 0.07);
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.08);
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            --radius: 16px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            background: var(--darker);
            min-height: 100vh;
            color: var(--text);
            padding: 20px;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--dark); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

        .header {
            background: linear-gradient(135deg, #0a0f1f 0%, #1a2a3a 100%);
            border-bottom: 1px solid var(--border);
            padding: 1.5rem 2rem;
            border-radius: var(--radius);
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .header h1 {
            font-weight: 700;
            font-size: 1.8rem;
            background: linear-gradient(135deg, #00c897, #00f5b0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header h1 i { -webkit-text-fill-color: #00c897; }
        .header-actions { display: flex; gap: 10px; flex-wrap: wrap; }

        .container { max-width: 1400px; margin: 0 auto; }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            transition: var(--transition);
        }

        .card:hover { border-color: rgba(0, 200, 151, 0.15); }

        .card-title {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 12px;
        }

        .card-title i { color: var(--primary); }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 14px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px 18px;
            transition: var(--transition);
        }

        .stat-card:hover { border-color: var(--primary); transform: translateY(-2px); }
        .stat-card .number { font-size: 2rem; font-weight: 800; color: var(--primary); line-height: 1.2; }
        .stat-card .label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 500; }
        .stat-card .label i { color: var(--primary); margin-right: 4px; }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 1024px) {
            .grid-2 { grid-template-columns: 1fr; }
        }

        .form-group { margin-bottom: 14px; }
        .form-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 200, 151, 0.1);
        }

        .form-group select option { background: var(--dark); color: var(--text); }
        .form-group textarea { resize: vertical; min-height: 60px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            justify-content: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            box-shadow: 0 4px 15px rgba(0, 200, 151, 0.25);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0, 200, 151, 0.35); }

        .btn-success { background: #198754; color: white; }
        .btn-success:hover { background: #157347; transform: translateY(-2px); }

        .btn-danger { background: #dc3545; color: white; }
        .btn-danger:hover { background: #c82333; transform: translateY(-2px); }

        .btn-warning { background: #ffc107; color: #1a1a2e; }
        .btn-warning:hover { background: #e0a800; transform: translateY(-2px); }

        .btn-secondary { background: var(--glass); color: var(--text); border: 1px solid var(--border); }
        .btn-secondary:hover { border-color: var(--primary); background: rgba(0, 200, 151, 0.05); }

        .btn-sm { padding: 6px 14px; font-size: 0.75rem; }
        .btn-block { width: 100%; }

        .status-badge {
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-available { background: rgba(0, 200, 151, 0.15); color: #00c897; }
        .status-assigned { background: rgba(255, 193, 7, 0.15); color: #ffc107; }
        .status-maintenance { background: rgba(220, 53, 69, 0.15); color: #dc3545; }

        .vehicle-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .vehicle-table th {
            text-align: left;
            padding: 10px 8px;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid var(--border);
            position: sticky;
            top: 0;
            background: var(--darker);
        }
        .vehicle-table td { padding: 10px 8px; border-bottom: 1px solid var(--border); color: var(--text); }
        .vehicle-table tr:hover td { background: rgba(255, 255, 255, 0.02); }

        .table-wrapper {
            max-height: 450px;
            overflow-y: auto;
        }

        .filter-bar {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .filter-bar input, .filter-bar select {
            padding: 8px 14px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 0.85rem;
            min-width: 140px;
        }

        .filter-bar input:focus, .filter-bar select:focus {
            outline: none;
            border-color: var(--primary);
        }

        .filter-bar select option { background: var(--dark); color: var(--text); }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: var(--dark);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 30px;
            animation: modalIn 0.3s ease;
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.95) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal .close-btn { float: right; background: none; border: none; color: var(--text-muted); font-size: 1.5rem; cursor: pointer; }
        .modal .close-btn:hover { color: var(--text); }

        .mt-16 { margin-top: 16px; }
        .mb-16 { margin-bottom: 16px; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
        .text-center { text-align: center; }
        .text-success { color: #00c897; }
        .text-danger { color: #dc3545; }
        .text-warning { color: #ffc107; }

        /* Toast */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--dark);
            border: 1px solid var(--primary);
            border-radius: 12px;
            padding: 16px 24px;
            color: var(--text);
            z-index: 2000;
            box-shadow: var(--shadow);
            animation: slideIn 0.3s ease;
            max-width: 400px;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes slideOut {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(100%); opacity: 0; }
        }

        @media (max-width: 768px) {
            .header { flex-direction: column; text-align: center; }
            .header h1 { font-size: 1.3rem; }
            .form-row { grid-template-columns: 1fr; }
            .filter-bar input, .filter-bar select { min-width: 100px; }
            .modal { padding: 20px; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

<div class="container">

    <!-- HEADER -->
    <div class="header">
        <h1><i class="fas fa-truck"></i> Vehicle Management</h1>
        <div class="header-actions">
            <button class="btn btn-secondary" onclick="window.location.href='user-payments.html'"><i class="fas fa-arrow-left"></i> User Page</button>
            <button class="btn btn-success" onclick="refreshData()"><i class="fas fa-sync"></i> Refresh</button>
            <button class="btn btn-primary" onclick="openAddModal()"><i class="fas fa-plus"></i> Add Vehicle</button>
        </div>
    </div>

    <!-- STATS -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="number" id="totalVehicles">0</div>
            <div class="label"><i class="fas fa-truck"></i> Total Vehicles</div>
        </div>
        <div class="stat-card">
            <div class="number" id="availableVehicles">0</div>
            <div class="label"><i class="fas fa-check-circle" style="color:#00c897;"></i> Available</div>
        </div>
        <div class="stat-card">
            <div class="number" id="assignedVehicles">0</div>
            <div class="label"><i class="fas fa-clock" style="color:#ffc107;"></i> Assigned</div>
        </div>
        <div class="stat-card">
            <div class="number" id="maintenanceVehicles">0</div>
            <div class="label"><i class="fas fa-tools" style="color:#dc3545;"></i> Maintenance</div>
        </div>
    </div>

    <!-- VEHICLE LIST -->
    <div class="card">
        <div class="card-title flex-between">
            <span><i class="fas fa-list"></i> Vehicle Fleet</span>
            <span style="font-size:0.75rem;color:var(--text-muted);">Total: <span id="vehicleCount">0</span> vehicles</span>
        </div>

        <div class="filter-bar">
            <input type="text" id="searchInput" placeholder="🔍 Search by reg number..." oninput="filterVehicles()" />
            <select id="statusFilter" onchange="filterVehicles()">
                <option value="all">All Status</option>
                <option value="available">Available</option>
                <option value="assigned">Assigned</option>
                <option value="maintenance">Under Maintenance</option>
            </select>
            <select id="typeFilter" onchange="filterVehicles()">
                <option value="all">All Types</option>
                <option value="Truck">Truck</option>
                <option value="Van">Van</option>
                <option value="Pickup">Pickup</option>
                <option value="Motorcycle">Motorcycle</option>
            </select>
        </div>

        <div class="table-wrapper">
            <table class="vehicle-table">
                <thead>
                    <tr>
                        <th>Reg Number</th>
                        <th>Type</th>
                        <th>Capacity (kg)</th>
                        <th>Status</th>
                        <th>Assigned To</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="vehiclesBody">
                    <tr><td colspan="6" style="text-align:center;padding:30px;color:var(--text-muted);">Loading vehicles...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- ADD/EDIT MODAL -->
    <div class="modal-overlay" id="vehicleModal">
        <div class="modal">
            <button class="close-btn" onclick="closeVehicleModal()"><i class="fas fa-times"></i></button>
            <h3 style="margin-bottom:16px;" id="modalTitle"><i class="fas fa-plus-circle" style="color:var(--primary);"></i> Add Vehicle</h3>
            <form id="vehicleForm" onsubmit="saveVehicle(event)">
                <input type="hidden" id="editId" value="" />

                <div class="form-group">
                    <label><i class="fas fa-hashtag"></i> Registration Number</label>
                    <input type="text" id="regNumber" placeholder="e.g. RW 1234A" required />
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label><i class="fas fa-car"></i> Vehicle Type</label>
                        <select id="vehicleType">
                            <option value="Truck">Truck</option>
                            <option value="Van">Van</option>
                            <option value="Pickup">Pickup</option>
                            <option value="Motorcycle">Motorcycle</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-weight-scale"></i> Capacity (kg)</label>
                        <input type="number" id="capacity" placeholder="e.g. 500" min="50" step="50" required />
                    </div>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-circle"></i> Status</label>
                    <select id="status">
                        <option value="available">Available</option>
                        <option value="assigned">Assigned</option>
                        <option value="maintenance">Under Maintenance</option>
                    </select>
                </div>

                <div class="form-group" id="assignGroup">
                    <label><i class="fas fa-user"></i> Assigned To</label>
                    <input type="text" id="assignedTo" placeholder="e.g. John Doe or Route A" />
                </div>

                <div class="form-group">
                    <label><i class="fas fa-info-circle"></i> Notes</label>
                    <textarea id="notes" placeholder="Maintenance notes or additional info..."></textarea>
                </div>

                <button type="submit" class="btn btn-primary btn-block"><i class="fas fa-save"></i> Save Vehicle</button>
            </form>
        </div>
    </div>

    <!-- DELETE CONFIRM MODAL -->
    <div class="modal-overlay" id="deleteModal">
        <div class="modal">
            <button class="close-btn" onclick="closeDeleteModal()"><i class="fas fa-times"></i></button>
            <h3 style="margin-bottom:16px;"><i class="fas fa-exclamation-triangle" style="color:#dc3545;"></i> Delete Vehicle</h3>
            <p>Are you sure you want to delete vehicle <strong id="deleteRegNumber"></strong>?</p>
            <p style="font-size:0.85rem;color:var(--text-muted);margin-top:8px;">This action cannot be undone.</p>
            <div style="margin-top:16px;display:flex;gap:10px;">
                <button class="btn btn-danger" onclick="confirmDelete()"><i class="fas fa-trash"></i> Delete</button>
                <button class="btn btn-secondary" onclick="closeDeleteModal()">Cancel</button>
            </div>
        </div>
    </div>

</div>

<script>
    // ===== DATA STORE =====
    let vehicles = [];
    let filteredVehicles = [];
    let deleteTargetId = null;

    // ===== INIT =====
    function init() {
        const saved = localStorage.getItem('ecowaste_vehicles');
        if (saved) {
            vehicles = JSON.parse(saved);
        } else {
            // Seed sample data
            vehicles = [
                { id: 'v1', regNumber: 'RW 1234A', type: 'Truck', capacity: 5000, status: 'available', assignedTo: '', notes: 'Fleet truck' },
                { id: 'v2', regNumber: 'RW 5678B', type: 'Van', capacity: 2500, status: 'assigned', assignedTo: 'Route A - Kigali', notes: '' },
                { id: 'v3', regNumber: 'RW 9012C', type: 'Pickup', capacity: 1000, status: 'available', assignedTo: '', notes: '' },
                { id: 'v4', regNumber: 'RW 3456D', type: 'Truck', capacity: 4000, status: 'maintenance', assignedTo: '', notes: 'Engine repair - due 2026-07-20' },
                { id: 'v5', regNumber: 'RW 7890E', type: 'Motorcycle', capacity: 200, status: 'available', assignedTo: '', notes: 'For quick pickups' },
                { id: 'v6', regNumber: 'RW 2345F', type: 'Van', capacity: 3000, status: 'assigned', assignedTo: 'Route B - Remera', notes: '' },
            ];
            localStorage.setItem('ecowaste_vehicles', JSON.stringify(vehicles));
        }
        filteredVehicles = [...vehicles];
        renderAll();
        updateStats();
    }

    // ===== RENDER VEHICLES =====
    function renderVehicles() {
        const tbody = document.getElementById('vehiclesBody');
        if (filteredVehicles.length === 0) {
            tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:30px;color:var(--text-muted);">No vehicles found</td></tr>`;
            return;
        }
        let html = '';
        filteredVehicles.forEach(v => {
            const statusClass = v.status === 'available' ? 'status-available' :
                               v.status === 'assigned' ? 'status-assigned' : 'status-maintenance';
            const statusIcon = v.status === 'available' ? '✅' :
                              v.status === 'assigned' ? '⏳' : '🔧';
            html += `
                <tr>
                    <td><strong>${v.regNumber}</strong></td>
                    <td><i class="fas ${v.type === 'Truck' ? 'fa-truck' : v.type === 'Van' ? 'fa-shuttle-van' : v.type === 'Pickup' ? 'fa-truck-pickup' : 'fa-motorcycle'}"></i> ${v.type}</td>
                    <td>${v.capacity.toLocaleString()} kg</td>
                    <td><span class="status-badge ${statusClass}">${statusIcon} ${v.status}</span></td>
                    <td>${v.assignedTo || '—'}</td>
                    <td>
                        <div style="display:flex;gap:4px;flex-wrap:wrap;">
                            <button class="btn btn-secondary btn-sm" onclick="editVehicle('${v.id}')" title="Edit">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button class="btn btn-danger btn-sm" onclick="openDeleteModal('${v.id}')" title="Delete">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            `;
        });
        tbody.innerHTML = html;
        document.getElementById('vehicleCount').textContent = filteredVehicles.length;
    }

    // ===== FILTER VEHICLES =====
    function filterVehicles() {
        const search = document.getElementById('searchInput').value.toLowerCase();
        const status = document.getElementById('statusFilter').value;
        const type = document.getElementById('typeFilter').value;

        filteredVehicles = vehicles.filter(v => {
            const matchSearch = v.regNumber.toLowerCase().includes(search);
            const matchStatus = status === 'all' || v.status === status;
            const matchType = type === 'all' || v.type === type;
            return matchSearch && matchStatus && matchType;
        });

        renderVehicles();
        updateStats();
    }

    // ===== UPDATE STATS =====
    function updateStats() {
        document.getElementById('totalVehicles').textContent = vehicles.length;
        document.getElementById('availableVehicles').textContent = vehicles.filter(v => v.status === 'available').length;
        document.getElementById('assignedVehicles').textContent = vehicles.filter(v => v.status === 'assigned').length;
        document.getElementById('maintenanceVehicles').textContent = vehicles.filter(v => v.status === 'maintenance').length;
    }

    // ===== RENDER ALL =====
    function renderAll() {
        renderVehicles();
    }

    // ===== OPEN ADD MODAL =====
    function openAddModal() {
        document.getElementById('modalTitle').innerHTML = '<i class="fas fa-plus-circle" style="color:var(--primary);"></i> Add Vehicle';
        document.getElementById('editId').value = '';
        document.getElementById('vehicleForm').reset();
        document.getElementById('assignedTo').value = '';
        document.getElementById('notes').value = '';
        document.getElementById('assignGroup').style.display = 'block';
        document.getElementById('vehicleModal').classList.add('active');
    }

    // ===== EDIT VEHICLE =====
    function editVehicle(id) {
        const v = vehicles.find(veh => veh.id === id);
        if (!v) return;

        document.getElementById('modalTitle').innerHTML = '<i class="fas fa-edit" style="color:var(--primary);"></i> Edit Vehicle';
        document.getElementById('editId').value = v.id;
        document.getElementById('regNumber').value = v.regNumber;
        document.getElementById('vehicleType').value = v.type;
        document.getElementById('capacity').value = v.capacity;
        document.getElementById('status').value = v.status;
        document.getElementById('assignedTo').value = v.assignedTo || '';
        document.getElementById('notes').value = v.notes || '';

        if (v.status === 'assigned') {
            document.getElementById('assignGroup').style.display = 'block';
        } else {
            document.getElementById('assignGroup').style.display = 'none';
        }

        document.getElementById('vehicleModal').classList.add('active');
    }

    // ===== SAVE VEHICLE =====
    function saveVehicle(e) {
        e.preventDefault();

        const id = document.getElementById('editId').value;
        const regNumber = document.getElementById('regNumber').value.trim();
        const type = document.getElementById('vehicleType').value;
        const capacity = parseInt(document.getElementById('capacity').value);
        const status = document.getElementById('status').value;
        const assignedTo = document.getElementById('assignedTo').value.trim();
        const notes = document.getElementById('notes').value.trim();

        if (!regNumber) { showNotification('Please enter registration number.', 'danger'); return; }
        if (!capacity || capacity < 50) { showNotification('Please enter a valid capacity (min 50kg).', 'danger'); return; }

        // Check for duplicate registration number
        const duplicate = vehicles.find(v => v.regNumber === regNumber && v.id !== id);
        if (duplicate) {
            showNotification('A vehicle with this registration number already exists.', 'danger');
            return;
        }

        if (id) {
            // Edit existing
            const index = vehicles.findIndex(v => v.id === id);
            if (index !== -1) {
                vehicles[index] = { ...vehicles[index], regNumber, type, capacity, status, assignedTo, notes };
                showNotification('✅ Vehicle updated successfully!');
            }
        } else {
            // Add new
            const newVehicle = {
                id: 'v' + Date.now(),
                regNumber,
                type,
                capacity,
                status,
                assignedTo: status === 'assigned' ? assignedTo : '',
                notes
            };
            vehicles.push(newVehicle);
            showNotification('✅ Vehicle added successfully!');
        }

        localStorage.setItem('ecowaste_vehicles', JSON.stringify(vehicles));
        closeVehicleModal();
        filterVehicles();
        updateStats();
    }

    // ===== OPEN DELETE MODAL =====
    function openDeleteModal(id) {
        const v = vehicles.find(veh => veh.id === id);
        if (!v) return;
        deleteTargetId = id;
        document.getElementById('deleteRegNumber').textContent = v.regNumber;
        document.getElementById('deleteModal').classList.add('active');
    }

    // ===== CONFIRM DELETE =====
    function confirmDelete() {
        if (!deleteTargetId) return;
        vehicles = vehicles.filter(v => v.id !== deleteTargetId);
        localStorage.setItem('ecowaste_vehicles', JSON.stringify(vehicles));
        deleteTargetId = null;
        closeDeleteModal();
        filterVehicles();
        updateStats();
        showNotification('🗑️ Vehicle deleted successfully!');
    }

    // ===== CLOSE MODALS =====
    function closeVehicleModal() {
        document.getElementById('vehicleModal').classList.remove('active');
    }

    function closeDeleteModal() {
        document.getElementById('deleteModal').classList.remove('active');
        deleteTargetId = null;
    }

    // ===== REFRESH DATA =====
    function refreshData() {
        init();
        showNotification('🔄 Data refreshed!');
    }

    // ===== STATUS CHANGE HANDLER =====
    document.addEventListener('DOMContentLoaded', function() {
        const statusSelect = document.getElementById('status');
        statusSelect.addEventListener('change', function() {
            const assignGroup = document.getElementById('assignGroup');
            if (this.value === 'assigned') {
                assignGroup.style.display = 'block';
            } else {
                assignGroup.style.display = 'none';
                document.getElementById('assignedTo').value = '';
            }
        });
    });

    // ===== NOTIFICATION =====
    function showNotification(msg, type = 'success') {
        const el = document.createElement('div');
        el.className = 'toast';
        const borderColor = type === 'danger' ? '#dc3545' : type === 'warning' ? '#ffc107' : 'var(--primary)';
        el.style.borderColor = borderColor;
        el.innerHTML = msg;
        document.body.appendChild(el);
        setTimeout(() => {
            el.style.animation = 'slideOut 0.3s ease';
            setTimeout(() => el.remove(), 300);
        }, 3000);
    }

    // ===== CLICK OUTSIDE TO CLOSE =====
    document.querySelectorAll('.modal-overlay').forEach(overlay => {
        overlay.addEventListener('click', function(e) {
            if (e.target === this) {
                this.classList.remove('active');
            }
        });
    });

    // ===== INIT =====
    document.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>
