<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>👑 Eco-Waste Admin - Notification Management</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        :root {
            --primary: #00c897;
            --primary-dark: #00997a;
            --dark: #0f172a;
            --darker: #0a0f1f;
            --card-bg: rgba(255, 255, 255, 0.07);
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.08);
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            --radius: 16px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            background: var(--darker);
            min-height: 100vh;
            color: var(--text);
            padding: 20px;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--dark); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

        .header {
            background: linear-gradient(135deg, #0a0f1f 0%, #1a2a3a 100%);
            border-bottom: 1px solid var(--border);
            padding: 1.5rem 2rem;
            border-radius: var(--radius);
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .header h1 {
            font-weight: 700;
            font-size: 1.8rem;
            background: linear-gradient(135deg, #00c897, #00f5b0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header h1 i { -webkit-text-fill-color: #00c897; }
        .header-actions { display: flex; gap: 10px; flex-wrap: wrap; }

        .container { max-width: 1400px; margin: 0 auto; }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            transition: var(--transition);
        }

        .card:hover { border-color: rgba(0, 200, 151, 0.15); }

        .card-title {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 12px;
        }

        .card-title i { color: var(--primary); }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 14px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px 18px;
            transition: var(--transition);
            cursor: pointer;
        }

        .stat-card:hover { border-color: var(--primary); transform: translateY(-2px); }
        .stat-card .number { font-size: 2rem; font-weight: 800; color: var(--primary); line-height: 1.2; }
        .stat-card .label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 500; }
        .stat-card .label i { color: var(--primary); margin-right: 4px; }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1.3fr;
            gap: 20px;
        }

        @media (max-width: 1024px) {
            .grid-2 { grid-template-columns: 1fr; }
        }

        .form-group { margin-bottom: 14px; }
        .form-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 200, 151, 0.1);
        }

        .form-group select option { background: var(--dark); color: var(--text); }
        .form-group textarea { resize: vertical; min-height: 80px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            justify-content: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            box-shadow: 0 4px 15px rgba(0, 200, 151, 0.25);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0, 200, 151, 0.35); }

        .btn-success { background: #198754; color: white; }
        .btn-success:hover { background: #157347; transform: translateY(-2px); }

        .btn-danger { background: #dc3545; color: white; }
        .btn-danger:hover { background: #c82333; transform: translateY(-2px); }

        .btn-warning { background: #ffc107; color: #1a1a2e; }
        .btn-warning:hover { background: #e0a800; transform: translateY(-2px); }

        .btn-secondary { background: var(--glass); color: var(--text); border: 1px solid var(--border); }
        .btn-secondary:hover { border-color: var(--primary); background: rgba(0, 200, 151, 0.05); }

        .btn-sm { padding: 6px 14px; font-size: 0.75rem; }
        .btn-block { width: 100%; }

        .filter-bar {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .filter-bar input, .filter-bar select {
            padding: 8px 14px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 0.85rem;
            min-width: 130px;
        }

        .filter-bar input:focus, .filter-bar select:focus {
            outline: none;
            border-color: var(--primary);
        }

        .filter-bar select option { background: var(--dark); color: var(--text); }

        .notification-list {
            max-height: 500px;
            overflow-y: auto;
        }

        .notification-item {
            display: flex;
            gap: 14px;
            padding: 12px 14px;
            border-bottom: 1px solid var(--border);
            transition: var(--transition);
            align-items: flex-start;
            border-left: 3px solid transparent;
        }

        .notification-item:hover { background: rgba(255, 255, 255, 0.03); }
        .notification-item.unread { border-left-color: var(--primary); background: rgba(0, 200, 151, 0.03); }

        .notification-item .icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 1rem;
        }

        .notification-item .icon.collection { background: rgba(0, 200, 151, 0.15); color: #00c897; }
        .notification-item .icon.assignment { background: rgba(255, 193, 7, 0.15); color: #ffc107; }
        .notification-item .icon.approval { background: rgba(13, 110, 253, 0.15); color: #0d6efd; }
        .notification-item .icon.payment { background: rgba(25, 135, 84, 0.15); color: #198754; }
        .notification-item .icon.announcement { background: rgba(108, 117, 125, 0.15); color: #adb5bd; }

        .notification-item .content { flex: 1; min-width: 0; }
        .notification-item .content .title { font-weight: 600; font-size: 0.9rem; margin-bottom: 3px; }
        .notification-item .content .message { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 3px; line-height: 1.3; }
        .notification-item .content .meta {
            display: flex;
            gap: 10px;
            font-size: 0.65rem;
            color: var(--text-muted);
            flex-wrap: wrap;
            align-items: center;
        }

        .status-badge {
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.6rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-read { background: rgba(0, 200, 151, 0.1); color: #00c897; }
        .status-unread { background: rgba(255, 193, 7, 0.1); color: #ffc107; }

        .notification-item .actions {
            display: flex;
            gap: 4px;
            flex-shrink: 0;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: var(--dark);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            max-width: 550px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 30px;
            animation: modalIn 0.3s ease;
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.95) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal .close-btn { float: right; background: none; border: none; color: var(--text-muted); font-size: 1.5rem; cursor: pointer; }
        .modal .close-btn:hover { color: var(--text); }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }

        .empty-state i { font-size: 3rem; margin-bottom: 12px; color: var(--border); }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--dark);
            border: 1px solid var(--primary);
            border-radius: 12px;
            padding: 16px 24px;
            color: var(--text);
            z-index: 2000;
            box-shadow: var(--shadow);
            animation: slideIn 0.3s ease;
            max-width: 400px;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes slideOut {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(100%); opacity: 0; }
        }

        .mt-16 { margin-top: 16px; }
        .mb-16 { margin-bottom: 16px; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
        .text-center { text-align: center; }

        @media (max-width: 768px) {
            .header { flex-direction: column; text-align: center; }
            .header h1 { font-size: 1.3rem; }
            .filter-bar input, .filter-bar select { min-width: 100px; }
            .form-row { grid-template-columns: 1fr; }
            .modal { padding: 20px; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
            .notification-item { flex-wrap: wrap; }
            .notification-item .actions { width: 100%; justify-content: flex-end; margin-top: 6px; }
        }
    </style>
</head>
<body>

<div class="container">

    <!-- HEADER -->
    <div class="header">
        <h1><i class="fas fa-bell"></i> Admin Notification Management</h1>
        <div class="header-actions">
            <button class="btn btn-secondary" onclick="window.location.href='user-payments.html'"><i class="fas fa-arrow-left"></i> User Page</button>
            <button class="btn btn-success" onclick="markAllAsRead()"><i class="fas fa-check-double"></i> Mark All Read</button>
            <button class="btn btn-primary" onclick="openSendModal()"><i class="fas fa-paper-plane"></i> New Notification</button>
            <button class="btn btn-secondary" onclick="refreshData()"><i class="fas fa-sync"></i> Refresh</button>
        </div>
    </div>

    <!-- STATS -->
    <div class="stats-grid">
        <div class="stat-card" onclick="filterByStatus('all')">
            <div class="number" id="totalNotifications">0</div>
            <div class="label"><i class="fas fa-bell"></i> Total</div>
        </div>
        <div class="stat-card" onclick="filterByStatus('unread')" style="border-color:rgba(255,193,7,0.3);">
            <div class="number" id="unreadCount" style="color:#ffc107;">0</div>
            <div class="label"><i class="fas fa-circle" style="color:#ffc107;"></i> Unread</div>
        </div>
        <div class="stat-card" onclick="filterByStatus('read')" style="border-color:rgba(0,200,151,0.3);">
            <div class="number" id="readCount" style="color:#00c897;">0</div>
            <div class="label"><i class="fas fa-check-circle" style="color:#00c897;"></i> Read</div>
        </div>
        <div class="stat-card" onclick="filterByType('announcement')" style="border-color:rgba(108,117,125,0.3);">
            <div class="number" id="announcementCount" style="color:#adb5bd;">0</div>
            <div class="label"><i class="fas fa-bullhorn"></i> Announcements</div>
        </div>
    </div>

    <!-- NOTIFICATIONS LIST -->
    <div class="card">
        <div class="card-title flex-between">
            <span><i class="fas fa-list"></i> All Notifications</span>
            <span style="font-size:0.75rem;color:var(--text-muted);">Showing: <span id="notificationCount">0</span></span>
        </div>

        <div class="filter-bar">
            <input type="text" id="searchInput" placeholder="🔍 Search..." oninput="filterNotifications()" />
            <select id="typeFilter" onchange="filterNotifications()">
                <option value="all">All Types</option>
                <option value="collection">Collection</option>
                <option value="assignment">Assignment</option>
                <option value="approval">Approval</option>
                <option value="payment">Payment</option>
                <option value="announcement">Announcement</option>
            </select>
            <select id="statusFilter" onchange="filterNotifications()">
                <option value="all">All Status</option>
                <option value="unread">Unread</option>
                <option value="read">Read</option>
            </select>
            <button class="btn btn-secondary btn-sm" onclick="clearFilters()"><i class="fas fa-times"></i> Clear</button>
            <button class="btn btn-danger btn-sm" onclick="deleteAllNotifications()"><i class="fas fa-trash"></i> Delete All</button>
        </div>

        <div class="notification-list" id="notificationList">
            <div class="empty-state">
                <i class="fas fa-bell-slash"></i>
                <p>No notifications found</p>
            </div>
        </div>
    </div>

    <!-- SEND NOTIFICATION MODAL -->
    <div class="modal-overlay" id="sendModal">
        <div class="modal">
            <button class="close-btn" onclick="closeSendModal()"><i class="fas fa-times"></i></button>
            <h3 style="margin-bottom:16px;"><i class="fas fa-paper-plane" style="color:var(--primary);"></i> Send Notification</h3>
            <form id="sendForm" onsubmit="sendNotification(event)">
                <div class="form-group">
                    <label><i class="fas fa-tag"></i> Type</label>
                    <select id="notificationType">
                        <option value="collection">Collection Schedule</option>
                        <option value="assignment">Assignment Update</option>
                        <option value="approval">Request Approval</option>
                        <option value="payment">Payment Confirmation</option>
                        <option value="announcement">Administrative Announcement</option>
                    </select>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-users"></i> Recipient</label>
                    <select id="recipient">
                        <option value="All Residents">All Residents</option>
                        <option value="Collectors">Collectors</option>
                        <option value="Admins">Admins</option>
                        <option value="Specific User">Specific User</option>
                    </select>
                </div>

                <div class="form-group" id="specificUserGroup" style="display:none;">
                    <label><i class="fas fa-user"></i> Specific User</label>
                    <input type="text" id="specificUser" placeholder="Enter user name" />
                </div>

                <div class="form-group">
                    <label><i class="fas fa-heading"></i> Title</label>
                    <input type="text" id="notificationTitle" placeholder="Notification title" required />
                </div>

                <div class="form-group">
                    <label><i class="fas fa-comment"></i> Message</label>
                    <textarea id="notificationMessage" placeholder="Detailed message..." required></textarea>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-flag"></i> Priority</label>
                    <select id="priority">
                        <option value="normal">Normal</option>
                        <option value="high">High Priority</option>
                        <option value="urgent">Urgent</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-primary btn-block"><i class="fas fa-paper-plane"></i> Send Notification</button>
            </form>
        </div>
    </div>

</div>

<script>
    // ===== DATA STORE =====
    let notifications = [];
    let filteredNotifications = [];

    // ===== INIT =====
    function init() {
        const saved = localStorage.getItem('ecowaste_notifications');
        if (saved) {
            notifications = JSON.parse(saved);
        } else {
            // Seed sample data
            const now = new Date();
            const formatDate = (days) => {
                const d = new Date(now);
                d.setDate(d.getDate() - days);
                return d.toISOString().split('T')[0] + ' ' + d.toTimeString().slice(0, 5);
            };

            notifications = [
                {
                    id: 'n1',
                    type: 'collection',
                    title: 'Collection Schedule Update',
                    message: 'Waste collection scheduled for tomorrow at 8:00 AM for Kigali district.',
                    recipient: 'All Residents',
                    status: 'unread',
                    date: formatDate(0),
                    priority: 'high'
                },
                {
                    id: 'n2',
                    type: 'assignment',
                    title: 'Vehicle Assignment',
                    message: 'Vehicle RW 5678B assigned to Route A - Kigali for today\'s collection.',
                    recipient: 'Collectors',
                    status: 'read',
                    date: formatDate(1),
                    priority: 'normal'
                },
                {
                    id: 'n3',
                    type: 'approval',
                    title: 'Request Approved',
                    message: 'Special pickup request for Bulk Waste has been approved for John Doe.',
                    recipient: 'Specific User',
                    status: 'unread',
                    date: formatDate(2),
                    priority: 'normal'
                },
                {
                    id: 'n4',
                    type: 'payment',
                    title: 'Payment Confirmed',
                    message: 'Payment of 25,000 RWF confirmed for Waste Collection. Invoice #INV-5001.',
                    recipient: 'All Residents',
                    status: 'read',
                    date: formatDate(3),
                    priority: 'normal'
                },
                {
                    id: 'n5',
                    type: 'announcement',
                    title: 'Holiday Schedule',
                    message: 'Waste collection services closed on 2026-07-25 for national holiday.',
                    recipient: 'All Residents',
                    status: 'unread',
                    date: formatDate(4),
                    priority: 'high'
                },
                {
                    id: 'n6',
                    type: 'collection',
                    title: 'Collection Reminder',
                    message: 'Reminder: Collection scheduled today at 2:00 PM. Please sort waste properly.',
                    recipient: 'Specific User',
                    status: 'read',
                    date: formatDate(5),
                    priority: 'normal'
                },
                {
                    id: 'n7',
                    type: 'payment',
                    title: 'Payment Overdue',
                    message: 'Payment of 15,000 RWF for Special Pickup is overdue. Please pay immediately.',
                    recipient: 'Specific User',
                    status: 'unread',
                    date: formatDate(6),
                    priority: 'urgent'
                },
                {
                    id: 'n8',
                    type: 'announcement',
                    title: 'New Recycling Center',
                    message: 'New recycling center opened in Remera district. Visit Eco-Recycle Kigali.',
                    recipient: 'All Residents',
                    status: 'read',
                    date: formatDate(7),
                    priority: 'normal'
                }
            ];
            localStorage.setItem('ecowaste_notifications', JSON.stringify(notifications));
        }
        filteredNotifications = [...notifications];
        renderAll();
        updateStats();
    }

    // ===== RENDER NOTIFICATIONS =====
    function renderNotifications() {
        const container = document.getElementById('notificationList');
        if (filteredNotifications.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-bell-slash"></i>
                    <p>No notifications found</p>
                </div>
            `;
            return;
        }

        let html = '';
        filteredNotifications.forEach(n => {
            const isUnread = n.status === 'unread';
            const statusClass = isUnread ? 'status-unread' : 'status-read';
            const typeClass = n.type;
            const priorityBadge = n.priority === 'urgent' ? '🔴' : n.priority === 'high' ? '🟡' : '';
            
            const iconMap = {
                collection: 'fa-trash-alt',
                assignment: 'fa-truck',
                approval: 'fa-check-circle',
                payment: 'fa-credit-card',
                announcement: 'fa-bullhorn'
            };
            const icon = iconMap[n.type] || 'fa-bell';

            html += `
                <div class="notification-item ${isUnread ? 'unread' : ''}">
                    <div class="icon ${typeClass}">
                        <i class="fas ${icon}"></i>
                    </div>
                    <div class="content">
                        <div class="title">${priorityBadge} ${n.title}</div>
                        <div class="message">${n.message}</div>
                        <div class="meta">
                            <span><i class="fas fa-user"></i> ${n.recipient}</span>
                            <span><i class="far fa-clock"></i> ${n.date}</span>
                            <span class="status-badge ${statusClass}">${n.status}</span>
                            <span style="text-transform:capitalize;font-size:0.6rem;color:var(--text-muted);">
                                <i class="fas ${iconMap[n.type]}"></i> ${n.type}
                            </span>
                            ${n.priority !== 'normal' ? `<span style="font-size:0.6rem;color:${n.priority === 'urgent' ? '#dc3545' : '#ffc107'};">${n.priority.toUpperCase()}</span>` : ''}
                        </div>
                    </div>
                    <div class="actions">
                        <button class="btn btn-secondary btn-sm" onclick="toggleRead('${n.id}')" title="Toggle Read">
                            <i class="fas ${isUnread ? 'fa-check' : 'fa-undo'}"></i>
                        </button>
                        <button class="btn btn-danger btn-sm" onclick="deleteNotification('${n.id}')" title="Delete">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
        document.getElementById('notificationCount').textContent = filteredNotifications.length;
    }

    // ===== FILTER NOTIFICATIONS =====
    function filterNotifications() {
        const search = document.getElementById('searchInput').value.toLowerCase();
        const type = document.getElementById('typeFilter').value;
        const status = document.getElementById('statusFilter').value;

        filteredNotifications = notifications.filter(n => {
            const matchSearch = n.title.toLowerCase().includes(search) || 
                               n.message.toLowerCase().includes(search) ||
                               n.recipient.toLowerCase().includes(search);
            const matchType = type === 'all' || n.type === type;
            const matchStatus = status === 'all' || n.status === status;
            return matchSearch && matchType && matchStatus;
        });

        renderNotifications();
        updateStats();
    }

    // ===== FILTER BY STATUS (from stats click) =====
    function filterByStatus(status) {
        document.getElementById('statusFilter').value = status;
        document.getElementById('typeFilter').value = 'all';
        document.getElementById('searchInput').value = '';
        filterNotifications();
    }

    function filterByType(type) {
        document.getElementById('typeFilter').value = type;
        document.getElementById('statusFilter').value = 'all';
        document.getElementById('searchInput').value = '';
        filterNotifications();
    }

    // ===== CLEAR FILTERS =====
    function clearFilters() {
        document.getElementById('searchInput').value = '';
        document.getElementById('typeFilter').value = 'all';
        document.getElementById('statusFilter').value = 'all';
        filterNotifications();
    }

    // ===== TOGGLE READ STATUS =====
    function toggleRead(id) {
        const n = notifications.find(not => not.id === id);
        if (!n) return;
        n.status = n.status === 'read' ? 'unread' : 'read';
        saveData();
        filterNotifications();
        updateStats();
        showNotification(`Notification marked as ${n.status}`);
    }

    // ===== MARK ALL AS READ =====
    function markAllAsRead() {
        if (notifications.length === 0) {
            showNotification('No notifications to mark.', 'warning');
            return;
        }
        notifications.forEach(n => n.status = 'read');
        saveData();
        filterNotifications();
        updateStats();
        showNotification('✅ All notifications marked as read!');
    }

    // ===== DELETE NOTIFICATION =====
    function deleteNotification(id) {
        if (!confirm('Delete this notification?')) return;
        notifications = notifications.filter(n => n.id !== id);
        saveData();
        filterNotifications();
        updateStats();
        showNotification('🗑️ Notification deleted');
    }

    // ===== DELETE ALL NOTIFICATIONS =====
    function deleteAllNotifications() {
        if (notifications.length === 0) {
            showNotification('No notifications to delete.', 'warning');
            return;
        }
        if (!confirm('Delete ALL notifications? This action cannot be undone.')) return;
        notifications = [];
        saveData();
        filterNotifications();
        updateStats();
        showNotification('🗑️ All notifications deleted');
    }

    // ===== SEND NOTIFICATION =====
    function sendNotification(e) {
        e.preventDefault();

        const type = document.getElementById('notificationType').value;
        const recipient = document.getElementById('recipient').value;
        const specificUser = document.getElementById('specificUser').value.trim();
        const title = document.getElementById('notificationTitle').value.trim();
        const message = document.getElementById('notificationMessage').value.trim();
        const priority = document.getElementById('priority').value;

        if (!title || !message) {
            showNotification('Please fill in all required fields.', 'danger');
            return;
        }

        const finalRecipient = recipient === 'Specific User' && specificUser ? specificUser : recipient;

        const newNotification = {
            id: 'n' + Date.now(),
            type: type,
            title: title,
            message: message,
            recipient: finalRecipient,
            status: 'unread',
            date: new Date().toISOString().split('T')[0] + ' ' + new Date().toTimeString().slice(0, 5),
            priority: priority
        };

        notifications.unshift(newNotification);
        saveData();
        closeSendModal();
        filterNotifications();
        updateStats();
        showNotification(`📨 Notification sent to ${finalRecipient}!`);
        document.getElementById('sendForm').reset();
        document.getElementById('specificUserGroup').style.display = 'none';
    }

    // ===== UPDATE STATS =====
    function updateStats() {
        document.getElementById('totalNotifications').textContent = notifications.length;
        document.getElementById('unreadCount').textContent = notifications.filter(n => n.status === 'unread').length;
        document.getElementById('readCount').textContent = notifications.filter(n => n.status === 'read').length;
        document.getElementById('announcementCount').textContent = notifications.filter(n => n.type === 'announcement').length;
    }

    // ===== SAVE DATA =====
    function saveData() {
        localStorage.setItem('ecowaste_notifications', JSON.stringify(notifications));
    }

    // ===== RENDER ALL =====
    function renderAll() {
        renderNotifications();
    }

    // ===== REFRESH DATA =====
    function refreshData() {
        init();
        showNotification('🔄 Data refreshed!');
    }

    // ===== MODAL CONTROLS =====
    function openSendModal() {
        document.getElementById('sendModal').classList.add('active');
        document.getElementById('sendForm').reset();
        document.getElementById('specificUserGroup').style.display = 'none';
    }

    function closeSendModal() {
        document.getElementById('sendModal').classList.remove('active');
    }

    // ===== RECIPIENT CHANGE HANDLER =====
    document.addEventListener('DOMContentLoaded', function() {
        const recipientSelect = document.getElementById('recipient');
        recipientSelect.addEventListener('change', function() {
            const specificGroup = document.getElementById('specificUserGroup');
            if (this.value === 'Specific User') {
                specificGroup.style.display = 'block';
            } else {
                specificGroup.style.display = 'none';
                document.getElementById('specificUser').value = '';
            }
        });
    });

    // ===== NOTIFICATION =====
    function showNotification(msg, type = 'success') {
        const el = document.createElement('div');
        el.className = 'toast';
        const borderColor = type === 'danger' ? '#dc3545' : type === 'warning' ? '#ffc107' : 'var(--primary)';
        el.style.borderColor = borderColor;
        el.innerHTML = msg;
        document.body.appendChild(el);
        setTimeout(() => {
            el.style.animation = 'slideOut 0.3s ease';
            setTimeout(() => el.remove(), 300);
        }, 3000);
    }

    // ===== CLICK OUTSIDE TO CLOSE =====
    document.querySelectorAll('.modal-overlay').forEach(overlay => {
        overlay.addEventListener('click', function(e) {
            if (e.target === this) {
                this.classList.remove('active');
            }
        });
    });

    // ===== INIT =====
    document.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>
